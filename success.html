<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome to APEX!</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #080808; color: #f0ede8; font-family: 'Barlow', sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px; }
    .icon { font-size: 5rem; margin-bottom: 24px; animation: pop 0.5s ease; }
    @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }
    h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 6rem); letter-spacing: 0.06em; margin-bottom: 16px; }
    h1 span { color: #d93025; }
    p { font-size: 1.05rem; color: #888; max-width: 420px; line-height: 1.8; margin-bottom: 36px; }
    a { background: #d93025; color: #f0ede8; font-family: 'Barlow Condensed', sans-serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.16em; text-transform: uppercase; padding: 16px 36px; text-decoration: none; transition: background 0.2s; }
    a:hover { background: #f03327; }
  </style>
</head>
<body>
  <div class="icon">🔥</div>
  <h1>Welcome to <span>APEX</span></h1>
  <p>Your subscription is active! Check your email for login details and your first workout plan. Your 7-day free trial has started — no charge until day 8.</p>
  <a href="/">Back to Home</a>
</body>
</html>
